<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Portal - Login</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <div class="page">
    <div class="card">

      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="white" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 8C2 9.34178 10.0949 13 11.9861 13C13.8772 13 21.9722 9.34178 21.9722 8C21.9722 6.65822 13.8772 3 11.9861 3C10.0949 3 2 6.65822 2 8Z"/>
    <path d="M5.99414 11L6.23925 16.6299C6.24415 16.7426 6.25634 16.8555 6.28901 16.9635C6.38998 17.2973 6.57608 17.6006 6.86 17.8044C9.08146 19.3985 14.8901 19.3985 17.1115 17.8044C17.3956 17.6006 17.5816 17.2973 17.6826 16.9635C17.7152 16.8555 17.7274 16.7426 17.7324 16.6299L17.9774 11"/>
    <path d="M20.4734 9.5V16.5M20.4734 16.5C19.6814 17.9463 19.3312 18.7212 18.9755 20C18.8983 20.455 18.9596 20.6843 19.2732 20.8879C19.4006 20.9706 19.5537 21 19.7055 21H21.2259C21.3876 21 21.5507 20.9663 21.6838 20.8745C21.9753 20.6735 22.0503 20.453 21.9713 20C21.6595 18.8126 21.2623 18.0008 20.4734 16.5Z"/>
</svg>
      </div>

      <h1>College Portal</h1>
      <p class="subtext">Welcome back! Please login to continue.</p>

      <form>

        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" />
        </div>

        <!-- ✅ CUSTOM ROLE DROPDOWN -->
        <div class="field">
          <label>Role</label>

          <div class="custom-select" id="roleSelect">

            <button type="button" class="select-btn" id="selectBtn">
              <span id="selectedText">Select your role</span>

              <!-- down arrow -->
              <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M6 9l6 6 6-6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <div class="select-menu" id="selectMenu">
              <div class="option" data-value="Student">Student</div>
              <div class="option" data-value="Teacher">Teacher</div>
              <div class="option" data-value="Admin">Admin</div>
            </div>

            <input type="hidden" id="roleInput" name="role" />

          </div>
        </div>

        <button type="submit" class="btn-primary">Login</button>

        <p class="help">Need help? Contact your administrator.</p>

        <div class="divider">
          <span></span>
          <p>Or</p>
          <span></span>
        </div>

        <button type="button" class="btn-outline">Create Student Account</button>

      </form>

    </div>
  </div>

  
  <script src="script.js"></script>

</body>
</html>
